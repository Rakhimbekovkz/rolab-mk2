function computeResult(){
  const c=[0,0,0,0];
  answers.forEach(a=>{if(a!=null)c[a]++});
  let best=0; for(let i=1;i<4;i++) if(c[i]>c[best]) best=i;
  return RESULTS[best];
}
function submitForm(){
  const name=(document.getElementById('f_name').value||'').trim();
  const phone=(document.getElementById('f_phone').value||'').trim();
  if(name.length<2||phone.replace(/\D/g,'').length<10){document.getElementById('err').style.display='block';return;}
  const res=computeResult();
  cur='result'; renderResult(res);
}
function renderResult(res){
  res=res||computeResult();
  setProgress();
  stepEl.textContent='Ваш результат';
  sidemsg.textContent="Отличный результат! Я передал его нашему специалисту — скоро свяжемся в WhatsApp. 🚀";
  stage.innerHTML=`<div class="result">
    <div class="rem">${res.e}</div>
    <div class="lab">СКЛОННОСТЬ ВАШЕГО РЕБЁНКА</div>
    <h2>${res.name}</h2>
    <p>${res.desc}</p>
    <div class="mk">
      <h3>Хотите, чтобы ребёнок попробовал это вживую? 🤖</h3>
      <p>Приглашаем на мастер-класс «День Робототехники»: за 2,5 часа ребёнок соберёт робота, запустит дрон и напечатает 3D-фигурку. Мы уже свяжемся с вами в WhatsApp.</p>
      <a class="btn pri big" href="${CONFIG.mk}" target="_blank">Узнать про мастер-класс →</a>
    </div>
  </div>`;
}
render();
</script>
